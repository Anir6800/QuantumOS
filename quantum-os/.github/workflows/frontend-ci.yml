name: Frontend CI

on:
  push:
    paths:
      - 'apps/frontend/**'
  pull_request:
    paths:
      - 'apps/frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Install
        run: pnpm install
      - name: Build frontend
        working-directory: apps/frontend
        run: pnpm --filter ./apps/frontend... build
      - name: Lint
        working-directory: apps/frontend
        run: pnpm --filter ./apps/frontend... lint || true
